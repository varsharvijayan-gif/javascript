<!DOCTYPE html>
<html>
<head>
    <title>Lottery Draw</title>

    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="text-center mt-5">

<h2>Lottery Draw</h2>

<button class="btn btn-primary" onclick="drawWinner()">Pick Winner</button>

<h3 id="result"></h3>


<div class="modal fade" id="winnerModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Winner</h5>
      </div>

      <div class="modal-body">
        <p id="modalResult"></p>
      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
      </div>

    </div>
  </div>
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>


let tickets = [101, 202, 303, 404, 505];


function drawWinner() {

  
    let index = Math.floor(Math.random() * tickets.length);

  
    let winner = tickets[index];

    
    console.log("Winner:", winner);

    
    document.getElementById("result").style.color = "red";
    document.getElementById("result").innerHTML = "Winner: " + winner;


    document.getElementById("modalResult").innerHTML = "Winner: " + winner;

    let modal = new bootstrap.Modal(document.getElementById('winnerModal'));
    modal.show();
}

</script>

</body>
</html>
