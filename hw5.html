<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Page</title>
</head>
<body>
    <p id="result"></p>
    <p id="userage"></p>
    <button onclick="checkAccess()">Check</button>
    <script>
      function checkAccess() { 
      let user={ 
        userName :"JohnDoe",
        userAge: 30,
        isAdmin:false
        };

    let message = (user.userAge>=18 && user.isAdmin==true) ? 
              "Access Granted":"Access Denied";
    document.getElementById("result").innerHTML = message;         
    document.getElementById("userage").innerHTML ="User Age Exist or not: " + ("userAge" in user);    
    delete user.userAge;
    console.log(user);
    }
  


       
    </script>
</body>
</html>
