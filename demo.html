
<!DOCTYPE html>
<html>
<body>

<h2>JavaScript Arithmetic Operators</h2>
<p id="demo"></p>
<script>

var dat = new Date();
var months = ["January","February","March","April","May","June","July","August","September","October","November","December"];
document.getElementById("demo").innerHTML = months[dat.getMonth()];
</script>
</body>
</html>
