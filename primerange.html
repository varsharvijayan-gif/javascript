<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
      let num = parseInt(prompt("ENter a number"));
      if(num<0){
        console.log("Factorial not exist for negative numbers");
      }
      else if(num===0){
        console.log("Factorial of 0 is 1");
      }
      else{
        let fact=1;
        for(i=1;i<=num;i++){
          fact *=i;
        
        }
          console.log(fact);
      } 
        
    </script>
</body>
</html>
