<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h4 id="right"></h4>
    <h4 id="invalid"></h4>
    <h4 id="wrong"></h4>
    <script>
        
        for (i=1;i<=5;i++) {
            let number = Number(prompt("Enter a number btn 1-5:"));
        if (i<1 || i>5) {
            let message = "Invalid"
            document.getElementById("invalid").innerHTML = message;
            continue;
        }   
        
        if (number == 3) {
            message = "Ur guess is right";
           document.getElementById("right").innerHTML = message;
           break;
        }else{
            message = "Wrong guess.Try again"
            document.getElementById("wrong").innerHTML = message;
           
            continue;
        }
     }

    
    </script>
</body>
</html>
