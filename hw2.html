<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p id="contact1Info"></p>
    <p id="contact2Info"></p>
    <script>
       let contact1={
            name:"Kevin",
            phone:"123-456-7890",
            email:"kevin@example.com",

            getInfo : function () {
                return "Name: " + this.name + ", Phone: " + this.phone + ", Email: " + this.email;
            }
        
        }
        function printContactInfo(contactObj) {
            document.getElementById("contact1Info").innerHTML= contactObj.getInfo();
        }
        printContactInfo(contact1);

       let contact2={
            name:"Reshma",
            phone:"987-654-3210",
            email:"reshma@example.com",

            getInfo : function () {
                return "Name: " + this.name + ", Phone: " + this.phone + ", Email: " + this.email;
            }
          }
            function printContactInfo2(contactObj) {
               document.getElementById("contact2Info").innerHTML= contactObj.getInfo();
            }
            printContactInfo2(contact2);
    </script>
</body>
</html>
