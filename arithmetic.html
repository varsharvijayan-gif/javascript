<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h4>Arithmetic Operations</h4>
    <p id="add"></p>
     <p id="sub"></p>
      <p id="mul"></p>
       <p id="div"></p>
        <p id="mod"></p>
   <script>
    function add() {
        return num1 + num2;
    }
    function sub() {
        return num1 - num2;
    }
    function mul() {
        return num1 * num2;
    }
    function div() {
        return num1 / num2;
    }
    function mod() {
        return num1 %  num2;
    }

    let num1 = Number(prompt("Enter a number:"));
    let num2 = Number(prompt("Enter another number"));

    let addResult=add();
    document.getElementById("add").innerHTML="Addtion: "+ addResult;

    let subResult=sub();
    document.getElementById("sub").innerHTML="Subtraction: "+ subResult;

    let mulResult=mul();
    document.getElementById("mul").innerHTML="Multiplication: "+ mulResult;

    let divResult=div();
    document.getElementById("div").innerHTML="Division: "+ divResult;

    let modResult=mod();
    document.getElementById("mod").innerHTML="Modulus: "+ modResult;
   
    
    </script> 
</body>
</html>
