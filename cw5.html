<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Item Return Page</title>
</head>
<body>
    <p id="result"></p>
    <p id="itemname"></p>
    <p id="neworder"></p>
   <button onclick="checkReturn()">Check</button>
    <script>
        function checkReturn(){
        let order = {
            itemName: "Wireless Headphones",
            isDelivered: true,
            daysSinceDelivery: 5,
        };

        let message = (order.isDelivered && order.daysSinceDelivery <= 7) ?
        "Eligible for return" : "Not eligible";

        document.getElementById("result").innerHTML = message;
        document.getElementById("itemname").innerHTML = "itemName" in order;
        delete order.daysSinceDelivery;

        console.log("Updated order:", order);

    }

    
        

        
    </script>
</body>
</html>
