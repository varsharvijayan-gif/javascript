<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <script>
    let num =1;
    isPrime = true;
    function checkPrime() {
      if (num<=1){
        console.log("Not prime");
      }
      else if (num>1){
         for (let i=2;i<=num/2;i++) {
        if (num%i==0){
          isPrime=false;
          break;
        } 
      }
      

      if(isPrime) {
        console.log(num + "is prime");
      } 
     
      
      else{
        console.log(num + "is not a prime");
      }
          
      }
    }
      checkPrime(num);
    
  </script>
</body>
</html>
